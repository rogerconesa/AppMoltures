name: Deploy Firebase Functions

on:
  push:
    branches: [ main ]
    paths:
      - 'functions/**'
      - 'firebase.json'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install function dependencies
        run: cd functions && npm install

      - name: Deploy Firebase Functions
        run: firebase deploy --only functions --project appmoltures --non-interactive --debug 2>&1 | tail -80 | tee /tmp/deploy-out.txt; exit ${PIPESTATUS[0]}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Save deploy output
        if: always()
        run: |
          cp /tmp/deploy-out.txt deploy-debug.txt 2>/dev/null || echo "no output" > deploy-debug.txt
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add deploy-debug.txt
          git diff --staged --quiet || git commit -m "chore: deploy debug log"
          git push
