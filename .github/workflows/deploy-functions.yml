name: Deploy Firebase Functions

on:
  push:
    branches: [ main ]
    paths:
      - 'functions/**'
      - 'firebase.json'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install function dependencies
        run: cd functions && npm install

      - name: Deploy Firebase Functions
        run: firebase deploy --only functions --project appmoltures --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Allow unauthenticated invocations (public CORS)
        run: |
          gcloud auth activate-service-account --key-file=<(echo '${{ secrets.GOOGLE_SA_JSON }}')
          gcloud functions add-invoker-policy-binding calendarEvent \
            --region=europe-west1 \
            --member="allUsers" \
            --project=appmoltures-500809
        continue-on-error: true
